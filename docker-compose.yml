services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  mariadb:
    image: mariadb:11
    container_name: edtech-mariadb
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: edtech_event_db
      MYSQL_USER: edtech
      MYSQL_PASSWORD: edtech1234
    ports:
      - "3307:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
      - ./db/schema.sql:/docker-entrypoint-initdb.d/schema.sql

  log-generator:
    build:
      context: ./log_generator
    container_name: edtech-log-generator
    depends_on:
      - kafka
    restart: on-failure

  ingestion-consumer:
    build:
      context: ./ingestion_consumer
    container_name: edtech-ingestion-consumer
    depends_on:
      - kafka
      - mariadb
    environment:
      DB_HOST: mariadb
      DB_PORT: 3306
      DB_USER: edtech
      DB_PASSWORD: edtech1234
      DB_NAME: edtech_event_db
    restart: on-failure

  metabase:
    image: metabase/metabase:latest
    container_name: edtech-metabase
    ports:
      - "3000:3000"
    depends_on:
      - mariadb

volumes:
  mariadb_data: